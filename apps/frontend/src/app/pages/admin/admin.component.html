<div class="admin-page">
  <div class="admin-header">
    <div>
      <h1>Users</h1>
      <p>User management overview</p>
    </div>
  </div>

  @if (users$ | async; as users) {
    @if (users.length > 0) {
      <div class="admin-card">
        <div class="users-table">
          <div class="users-table__head users-table__row">
            <div>Name</div>
            <div>Email</div>
            <div>Role</div>
            <div>Created</div>
          </div>

          @for (user of users; track user.id) {
            <div class="users-table__row">
              <div>{{ user.name || '—' }}</div>
              <div>{{ user.email }}</div>
              <div>
                <span
                  class="role-badge"
                  [class.role-badge--admin]="user.role === 'ADMIN'"
                  [class.role-badge--viewer]="user.role === 'VIEWER'"
                >
                  {{ user.role }}
                </span>
              </div>
              <div>{{ user.createdAt | date: 'medium' }}</div>
            </div>
          }
        </div>
      </div>
    } @else {
      <div class="admin-card empty-state">
        <p>No users found.</p>
      </div>
    }
  }
</div>
