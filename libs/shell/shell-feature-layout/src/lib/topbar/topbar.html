<div class="topbar">
  <div class="page-title">Dashboard</div>

  <div class="topbar-center">
    <label class="search-box">
      @if (searchTerm()) {
        <button type="button" class="clear-search-button" aria-label="Clear search" (click)="clearSearch()">
          <lib-app-icon name="x" [size]="18" [color]="'#64748b'"></lib-app-icon>
        </button>
      }
      <input
        type="text"
        name="market-search"
        placeholder="Search markets, orders, assets..."
        aria-label="Search"
        autocomplete="off"
        (focus)="onSearchFocus()"
        (blur)="onSearchBlur()"
        [ngModel]="searchTerm()"
        (ngModelChange)="onSearchChange($event)"
      />
      <button type="button" class="search-button">
        <lib-app-icon name="search" [size]="22" [color]="isFocused ? '#3b82f6' : '#64748b'"></lib-app-icon>
      </button>
    </label>
  </div>

  <div class="topbar-actions">

    <button type="button" class="notifications-button" (click)="toggleNotifications()">
      <lib-app-icon name="bell" [size]="22"></lib-app-icon>
    </button>
    <a class="profile-button" routerLink="/profile">
      <lib-app-icon name="user" [size]="22"></lib-app-icon>
    </a>
    @if (user$(); as user) {
      <div class="topbar-user">
        @if (user?.role === 'ADMIN') {
          <button type="button" (click)="goToAdmin()" title="Admin Panel">
            <lib-app-icon name="folder-kanban" [size]="22"></lib-app-icon>
          </button>
        }
        <span class="topbar-user-name">{{ user?.name || user?.email }}</span>
        <button type="button" class="logout-button" (click)="logout()">
          <lib-app-icon name="logout" [size]="22"></lib-app-icon>
        </button>
      </div>
    }

  </div>
  @if (isNotificationsOpen()) {
    <div class="notifications-popover">
      <app-notification-panel
        [notifications]="notifications"
        (notificationClick)="handleNotificationClick($event)"
      />
    </div>
  }
</div>
