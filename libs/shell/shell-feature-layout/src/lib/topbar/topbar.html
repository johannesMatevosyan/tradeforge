<div class="topbar">
  <div class="page-title">Dashboard</div>

  <div class="topbar-center">
    <label class="search-box">
      @if (searchTerm()) {
        <button type="button" class="clear-search-button" aria-label="Clear search" (click)="clearSearch()">
          <app-icon name="x" [size]="18" [color]="'#64748b'"></app-icon>
        </button>
      }
      <input
        type="text"
        name="search"
        placeholder="Search markets, orders, assets..."
        aria-label="Search"
        (focus)="onSearchFocus()"
        (blur)="onSearchBlur()"
        [ngModel]="searchTerm()"
        (ngModelChange)="onSearchChange($event)"
      />
      <button type="button" class="search-button">
        <app-icon name="search" [size]="22" [color]="isFocused ? '#3b82f6' : '#64748b'"></app-icon>
      </button>
    </label>
  </div>

  <div class="topbar-actions">

    <button type="button" class="notifications-button" (click)="toggleNotifications()">
      <app-icon name="bell" [size]="22"></app-icon>
    </button>
    <a type="button" class="profile-button" routerLink="/profile">
      <app-icon name="user" [size]="22"></app-icon>
    </a>
  </div>
  @if (isNotificationsOpen()) {
    <div class="notifications-popover">
      <app-notification-panel
        [notifications]="notifications"
        (notificationClick)="handleNotificationClick($event)"
      />
    </div>
  }
</div>
