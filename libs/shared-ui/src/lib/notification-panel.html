<div class="notification-panel">

  <!-- Header -->
  <div class="panel-header">
    <span class="title">Notifications</span>


    <button
      class="mark-all-btn"
      [hidden]="(unreadCount$ | async) === 0"
      (click)="markAll()"
    >
      Mark all as read
    </button>
  </div>

  <!-- Tabs -->
  <div class="panel-tabs">
    <button
      [class.active]="selectedFilter === 'all'"
      (click)="selectedFilter = 'all'"
    >
      All
    </button>

    <button
      [class.active]="selectedFilter === 'unread'"
      (click)="selectedFilter = 'unread'"
    >
      Unread
    </button>
  </div>

  <!-- List -->
  <div class="panel-body">
    @if(filteredNotifications.length) {

      @for (n of filteredNotifications; track n.id) {
        <div
          class="notification-item"
          (click)="onNotificationClick(n)"
          [class.unread]="!n.isRead"
        >
          <div class="title">{{ n.title }}</div>
          <div class="message">{{ n.message }}</div>
          <div class="time">{{ n.createdAtLabel }}</div>
        </div>
      }

    } @else {
      <div class="empty">
        <div class="empty-title">No notifications</div>
        <div class="empty-subtitle">You're all caught up.</div>
      </div>
    }

  </div>

</div>
