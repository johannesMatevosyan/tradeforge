<div class="profile-account">
  <div class="profile-account__header">
    <h1>Account</h1>
    <p>Manage your personal information and contact details.</p>
  </div>

  <div class="profile-account__card">
    <form
      class="profile-account__form"
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
    >
      <div class="form-row">
        <label for="fullName">Full name</label>
        <input id="fullName" type="text" formControlName="fullName" autocomplete="off" />
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" autocomplete="off" />
      </div>

      <ng-template #loading>
        <p>Loading...</p>
      </ng-template>

      <ng-container *ngTemplateOutlet="formMessages"></ng-container>
      <button type="submit" [disabled]="isSaving()">
        {{ isSaving() ? 'Saving...' : 'Save changes' }}
      </button>
    </form>
  </div>

</div>


<ng-template #formMessages>
  @if (successMessage()) {
    <p class="success-message">{{ successMessage() }}</p>
  }

  @if (errorMessage()) {
    <p class="error-message">{{ errorMessage() }}</p>
  }
</ng-template>
