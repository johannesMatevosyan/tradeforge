<div class="profile-account">
  <div class="profile-account__header">
    <h1>Account</h1>
    <p>Manage your personal information and contact details.</p>
  </div>

  <div class="profile-account__card">
    <form class="profile-account__form">
      <div class="form-row">
        <label for="fullName">Full name</label>
        <input id="fullName" type="text" value="Hovhannes Matevosyan" />
      </div>

      <div class="form-row">
        <label for="email">Email</label>
        <input id="email" type="email" value="example@email.com" />
      </div>

      <div class="form-row">
        <label for="phone">Phone</label>
        <input id="phone" type="text" value="+374 ..." />
      </div>

      <button type="button">Save changes</button>
    </form>
  </div>
</div>
