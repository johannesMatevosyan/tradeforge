<section class="portfolio-page">
  <header class="portfolio-header">
    <div>
      <h1>Portfolio</h1>
      <p>Track your holdings, exposure and position value</p>
    </div>
  </header>

  <div class="portfolio-summary">
    <div class="summary-card">Total Value</div>
    <div class="summary-card">Open Positions</div>
    <div class="summary-card">Total Invested</div>
    <div class="summary-card">PnL</div>
  </div>

    @if (orders$ | async; as orders) {
        @let positions = getPositions(orders);

        <div class="positions-card">
            @if (positions.length) {
                <lib-positions-table [positions]="positions"></lib-positions-table>
            } @else {
                <div class="empty-state">No positions yet.</div>
            }
                </div>
            }
</section>
