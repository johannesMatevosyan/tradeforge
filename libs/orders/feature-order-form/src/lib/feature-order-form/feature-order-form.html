<form class="order-form" [formGroup]="orderForm" (ngSubmit)="submit()">
  <div class="order-form__header">
    <h3>Place Order</h3>
    <span>Demo trading</span>
  </div>

  <label class="field">
    <span>Symbol</span>
    <input formControlName="symbol" placeholder="BTCUSD" />
  </label>

  @if (currentPrice !== null) {
    <div class="market-price">
      Live price: {{ currentPrice }}
    </div>
  }

  <div class="field">
    <span>Side</span>
    <div class="side-toggle">
      @for (side of sides; track side) {
        <button
          type="button"
          [class.active]="orderForm.controls.side.value === side"
          [class.buy]="side === 'BUY'"
          [class.sell]="side === 'SELL'"
          (click)="orderForm.controls.side.setValue(side)"
        >
          {{ side }}
        </button>
      }
    </div>
  </div>

  <label class="field">
    <span>Order Type</span>
    <select formControlName="type">
      @for (type of types; track type) {
        <option [value]="type">{{ type }}</option>
      }
    </select>
  </label>

  <label class="field">
    <span>Quantity</span>
    <input formControlName="quantity" inputmode="decimal" placeholder="0.01" />

    @if (orderForm.controls.quantity.touched && orderForm.controls.quantity.invalid) {
      <small class="field-error">
        Quantity must be greater than 0.
      </small>
    }
  </label>

  @if (isLimitOrder) {
    <label class="field">
      <span>Limit Price</span>
      <input
        formControlName="price"
        [disabled]="isMarketOrder"
        inputmode="decimal"
        placeholder="65000.00" />

      @if (orderForm.controls.price.touched && orderForm.controls.price.invalid) {
        <small class="field-error">
          Price is required for LIMIT orders and must be greater than 0.
        </small>
      }
    </label>
  }

  <button class="submit-btn" type="submit" [disabled]="isSubmitting">
    {{ isSubmitting ? 'Placing...' : 'Place Order' }}
  </button>

  @if (successMessage) {
    <p class="success">{{ successMessage }}</p>
  }
  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }
</form>
