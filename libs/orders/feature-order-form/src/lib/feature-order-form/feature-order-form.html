<form [formGroup]="orderForm" (ngSubmit)="submit()">
  <div class="field">
    <label>Symbol</label>
    <input formControlName="symbol" placeholder="e.g. BTCUSD" />
  </div>

  <div class="field">
    <label>Side</label>
    <select formControlName="side">
      <option *ngFor="let s of sides" [value]="s">{{ s }}</option>
    </select>
  </div>

  <div class="field">
    <label>Type</label>
    <select formControlName="type">
      <option *ngFor="let t of types" [value]="t">{{ t }}</option>
    </select>
  </div>

  <div class="field">
    <label>Quantity</label>
    <input formControlName="quantity" type="number" step="0.0001" />
  </div>

  <div class="field" *ngIf="isLimit">
    <label>Price</label>
    <input formControlName="price" type="number" step="0.01" />
  </div>

  <button type="submit" [disabled]="orderForm.invalid">Place Order</button>
</form>
