<form class="order-form" [formGroup]="orderForm" (ngSubmit)="submit()">
  <div class="order-form__header">
    <h3>Place Order</h3>
    <span>Demo trading</span>
  </div>

  <label class="field">
    <span>Symbol</span>
    <input formControlName="symbol" placeholder="BTCUSD" />
  </label>

  <div class="field">
    <span>Side</span>
    <div class="side-toggle">
      @for (side of sides; track side) {
        <button
          type="button"
          [class.active]="orderForm.controls.side.value === side"
          [class.buy]="side === 'BUY'"
          [class.sell]="side === 'SELL'"
          (click)="orderForm.controls.side.setValue(side)"
        >
          {{ side }}
        </button>
      }
    </div>
  </div>

  <label class="field">
    <span>Order Type</span>
    <select formControlName="type">
      @for (type of types; track type) {
        <option [value]="type">{{ type }}</option>
      }
    </select>
  </label>

  <label class="field">
    <span>Quantity</span>
    <input formControlName="quantity" inputmode="decimal" placeholder="0.01" />
  </label>

  @if (isLimitOrder) {
  <label class="field">
    <span>Limit Price</span>
    <input formControlName="price" inputmode="decimal" placeholder="65000.00" />
  </label>
  }

  <button class="submit-btn" type="submit" [disabled]="isSubmitting">
    {{ isSubmitting ? 'Placing...' : 'Place Order' }}
  </button>

  @if (successMessage) {
    <p class="success">{{ successMessage }}</p>
  }
  @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
  }
</form>
