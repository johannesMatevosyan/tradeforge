<section class="orders-page">
    <header class="orders-header">
        <div>
        <h1>Orders</h1>
        <p>Track and manage trading activity</p>
        </div>
    </header>

    <div class="orders-summary">
        <div class="summary-card">Total Orders</div>
        <div class="summary-card">Open Orders</div>
        <div class="summary-card">Filled Orders</div>
        <div class="summary-card">Cancelled</div>
    </div>

    <div class="orders-card ++++">
        @if (orders$ | async; as orders) {
            <p>Total: {{ orders.length }}</p>

            @if(orders.length > 0) {

                <lib-orders-table [orders]="orders"></lib-orders-table>

            } @else {
                <div class="empty-state">
                    No orders yet.
                </div>
            }

        }
    </div>
</section>
