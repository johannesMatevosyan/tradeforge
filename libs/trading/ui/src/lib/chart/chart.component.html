<div class="chart-header">
  <div class="symbol">{{ symbol }}</div>
  <div class="chart-price"
    [class.up]="direction === 'up'"
    [class.down]="direction === 'down'"
    >
    {{ price | number: '1.2-2' }}
  </div>
</div>

<div
  class="chart-body"
  [class.up]="direction === 'up'"
  [class.down]="direction === 'down'"
>
  <div class="chart-placeholder">
    @if (history.length > 1) {
      <svg viewBox="0 0 1000 320" preserveAspectRatio="none">

        <!-- line -->
        <polyline
          [attr.points]="points"
          fill="none"
          stroke="currentColor"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        />

        <!-- current price line -->
        <line
          x1="0"
          x2="1000"
          [attr.y1]="lastPriceY"
          [attr.y2]="lastPriceY"
          class="price-line"
        />

      </svg>
    } @else {
      <div class="chart-empty">Waiting for live data...</div>
    }
  </div>
</div>
