<div class="market-watch">
  <h3>Market Watch</h3>

    <div class="symbol-list">
        @for (item of symbols; track item.symbol) {
            @let price = getPrice(item.symbol);

            <button
                type="button"
                class="symbol-row"
                [class.active]="item.symbol === selectedSymbol"
                [class.up]="price?.direction === 'up'"
                [class.down]="price?.direction === 'down'"
                (click)="symbolSelected.emit(item.symbol)"
            >
                <span>
                    <strong>{{ item.symbol }}</strong>
                    <small>{{ item.name }}</small>
                </span>

                <span class="market-price">
                    {{ price?.price ?? 0 | number: '1.2-2' }}
                </span>
            </button>
        }
    </div>
</div>
