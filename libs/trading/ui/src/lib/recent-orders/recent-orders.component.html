<div class="orders-header">
  <h3>Recent Orders</h3>
</div>

 @if(orders.length > 0) {
    <div class="orders-list">
        @for (order of orders; track order.id) {
            <div class="order-row">
                <strong class="symbol">{{ order.symbol }}</strong>

                <small class="type" [class.buy]="order.type === 'BUY'" [class.sell]="order.type === 'SELL'">
                    {{ order.side }} · {{ order.type }}
                </small>

                <small>{{ order.price }}</small>

                <div class="status"
                    [class.filled]="order.status === 'FILLED'"
                    [class.open]="order.status === 'OPEN'"
                    [ngClass]="order.status.toLowerCase()">
                {{ order.status }}
                </div>
            </div>
        }
    </div>
} @else {
    <div class="no-orders">
        No recent orders.
    </div>
}
