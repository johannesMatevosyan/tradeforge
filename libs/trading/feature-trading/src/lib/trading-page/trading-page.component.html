<section class="trading-page">
  <div class="trading-main">
    <div class="chart-card">
      <lib-chart
        [symbol]="(selectedSymbol$ | async) ?? 'BTC/USD'">
      </lib-chart>
    </div>

    <div class="orders-card">
      <lib-recent-orders
        [orders]="(orders$ | async) ?? []">
      </lib-recent-orders>
    </div>
  </div>

  <aside class="trading-side">
    <div class="order-card">
      <lib-place-order
        [symbol]="(selectedSymbol$ | async) ?? 'BTC/USD'"
        (orderPlaced)="onOrderPlaced($event)">
      </lib-place-order>
    </div>

    <div class="watchlist-card">
      <lib-market-watch
        [symbols]="symbols"
        [selectedSymbol]="(selectedSymbol$ | async) ?? 'BTC/USD'"
        (symbolSelected)="onSymbolSelected($event)">
      </lib-market-watch>
    </div>
  </aside>
</section>
