<section class="trading-page">
  <div class="trading-main">
    <div class="chart-card">
      <lib-chart
        [symbol]="selectedSymbol"
        [price]="currentPrice">
      </lib-chart>
    </div>

    <div class="orders-card">
      <lib-recent-orders [orders]="orders"></lib-recent-orders>
    </div>
  </div>

  <aside class="trading-side">
    <div class="order-card">
      <lib-place-order (orderPlaced)="onOrderPlaced($event)"></lib-place-order>
    </div>

    <div class="watchlist-card">
      Watchlist
    </div>
  </aside>
</section>
