<div class="dashboard">
    <lib-page-header
      [pageEyebrow]="'Trading overview'"
      [pageTitle]="'Dashboard'"
      [pageDescription]="'Monitor portfolio performance, market activity, positions, and realtime trading insights.'"
    ></lib-page-header>

  <div class="dashboard-layout">
    <main class="dashboard-main">
      <section class="card dashboard-summary">
        <lib-portfolio-summary></lib-portfolio-summary>
      </section>

      <section class="card dashboard-positions">
        <lib-positions></lib-positions>
      </section>

      <section class="card dashboard-market">
        <lib-feature-ticker></lib-feature-ticker>
      </section>

      <section class="card dashboard-orders">
        <div class="orders-layout">
          <lib-feature-order-form></lib-feature-order-form>
          <lib-orders-history></lib-orders-history>
        </div>

      </section>
    </main>

    <aside class="dashboard-side">
      <section class="card dashboard-watchlist">
        <app-watchlist></app-watchlist>
      </section>
    </aside>
  </div>
</div>
