<section class="watchlist">
  <h3>Watchlist</h3>

  @if (isLoading()) {
    <div class="watchlist-state">Loading watchlist...</div>
  } @else if (error()) {
    <div class="watchlist-state">{{ error() }}</div>
  } @else if (filteredItems().length === 0) {
    <div class="watchlist-state">No matching symbols found.</div>
  } @else {
    <ul class="watchlist-data">
      @for (item of filteredItems(); track item.id) {

      <li class="watchlist-data-item">
        @let live = getLivePrice(item.symbolCode);

        <button
          class="watchlist-row"
          [class.watchlist-row--up]="live?.direction === 'up'"
          [class.watchlist-row--down]="live?.direction === 'down'"
          [class.selected]="selectedSymbol() === item.symbolCode"
          tabindex="0"
          (click)="selectForOrder(item.symbolCode)"
        >
          <div class="watchlist-left">
            <strong>{{ item.symbolCode }}</strong>
            <span>{{ item.displayName }}</span>
          </div>

          <div class="watchlist-right">
            @if (live) {
              <strong>{{ live.price | number:'1.2-2' }}</strong>
              <span class="direction">
                {{ live.direction === 'up' ? '▲' : live.direction === 'down' ? '▼' : '•' }}
              </span>
            } @else {
              <strong>—</strong>
            }
          </div>
        </button>

        <button
          type="button"
          class="watchlist-remove"
          title="Remove from watchlist"
          aria-label="Remove {{ item.symbolCode }} from watchlist"
          (click)="removeItem(item.id)"
        >
          ×
        </button>
      </li>
      }
    </ul>
  }
</section>
