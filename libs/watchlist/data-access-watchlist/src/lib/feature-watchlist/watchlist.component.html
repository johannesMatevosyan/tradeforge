<section class="watchlist">
  <lib-page-header
    [pageEyebrow]="'Realtime tracking'"
    [pageTitle]="'Track your favorite markets'"
    [pageDescription]="'Add symbols to your watchlist to monitor their live prices and quickly access order entry.'"
  ></lib-page-header>

  <div class="watchlist-header">

    <div class="watchlist-search">
      <input
        type="search"
        class="watchlist-search-input"
        placeholder="Search watchlist..."
        [value]="searchTerm()"
        (input)="onSearchChanged($event)"
      />
    </div>


    <div class="watchlist-add">
      <select [value]="selectedSymbolToAdd()" class="watchlist-select" (change)="onSymbolToAddChanged($event)">
        <option value="">Add symbol</option>

        @for (symbol of availableSymbols(); track symbol.code) {
          <option [value]="symbol.code">
            {{ getSymbolLabel(symbol) }}
          </option>
        }
      </select>

      <button
        type="button"
        class="watchlist-add-button"
        [disabled]="!selectedSymbolToAdd()"
        (click)="addSelectedSymbol()"
      >
        Add
      </button>
    </div>
  </div>

  @if (isLoading()) {
    <div class="watchlist-state">Loading watchlist...</div>
  } @else if (error()) {
    <div class="watchlist-state">{{ error() }}</div>
  } @else if (filteredItems().length === 0) {
    <div class="watchlist-state">No matching symbols found.</div>
  } @else {
    <ul class="watchlist-data">
      @for (item of filteredItems(); track item.id) {

      <li class="watchlist-data-item">
        @let live = getLivePrice(item.symbolCode);

        <button
          class="watchlist-row"
          [class.watchlist-row--up]="live?.direction === 'up'"
          [class.watchlist-row--down]="live?.direction === 'down'"
          [class.selected]="selectedSymbol() === item.symbolCode"
          tabindex="0"
          (click)="selectForOrder(item.symbolCode)"
        >
          <div class="watchlist-left">
            <strong>{{ item.normalizedSymbol }}</strong>
            <span>{{ item.displayName }}</span>
          </div>

          <div class="watchlist-right">
            @if (live) {
              <strong>{{ live.price | number:'1.2-2' }}</strong>
              <span class="direction">
                {{ live.direction === 'up' ? '▲' : live.direction === 'down' ? '▼' : '•' }}
              </span>
            } @else {
              <span class="watchlist-offline">Offline</span>
            }
          </div>
        </button>

        <button
          type="button"
          class="watchlist-remove"
          title="Remove from watchlist"
          aria-label="Remove {{ item.symbolCode }} from watchlist"
          (click)="removeItem(item.id)"
        >
          ×
        </button>
      </li>
      }
    </ul>
  }
</section>
